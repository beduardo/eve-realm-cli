syntax = "proto3";

package mcp.v1;

option go_package = "github.com/beduardo/eve-realm-cli/gen/proto/mcp/v1;mcpv1";

// ListToolsRequest is an empty request message for the ListTools RPC.
message ListToolsRequest {}

// ToolDescriptor describes a single tool exposed by the MCP server.
message ToolDescriptor {
  string name         = 1;
  string description  = 2;
  string input_schema = 3;
}

// ListToolsResponse carries the list of tool descriptors returned by ListTools.
message ListToolsResponse {
  repeated ToolDescriptor tools = 1;
}

// InvokeToolRequest carries the tool name and a JSON-encoded input payload.
message InvokeToolRequest {
  string name  = 1;
  string input = 2;
}

// InvokeToolResponse carries the JSON-encoded output returned by the invoked tool.
message InvokeToolResponse {
  string output = 1;
}

// MCPService is the gRPC service exposed by the MCP server.
// It allows clients to discover available tools and invoke them by name.
service MCPService {
  // ListTools returns all tools currently registered with the MCP server.
  rpc ListTools(ListToolsRequest) returns (ListToolsResponse);

  // InvokeTool calls the named tool with the provided JSON input and returns
  // the JSON output produced by the tool.
  rpc InvokeTool(InvokeToolRequest) returns (InvokeToolResponse);
}
